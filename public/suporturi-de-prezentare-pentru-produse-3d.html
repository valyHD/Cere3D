  <style>
    :root{
      --prod-blue:#173a63;
      --prod-blue-2:#2f6b9f;
      --prod-blue-3:#607f99;
      --prod-dark:#102844;
      --prod-soft:#f8fbff;
      --prod-soft-2:#edf6ff;
      --prod-line:rgba(23,58,99,.12);
      --prod-orange:#f07a30;
      --prod-orange-soft:#fff4ea;
      --prod-shadow:0 18px 46px rgba(16,40,68,.08);
      --prod-cta:#e8f4ff;
      --prod-cta-2:#f8fbff;
    }

    body[data-page="seo-hub"]{
      color:var(--prod-blue);
      background:
        radial-gradient(circle at 10% 8%, rgba(240,122,48,.08), transparent 23%),
        radial-gradient(circle at 90% 15%, rgba(23,58,99,.08), transparent 34%),
        linear-gradient(180deg, #f9fbff 0%, #ffffff 46%, #eef7ff 100%);
      font-family:"Inter", sans-serif;
    }

    body[data-page="seo-hub"] .topbar{
      background:rgba(255,255,255,.96);
      border-bottom:1px solid rgba(23,58,99,.08);
      backdrop-filter:blur(10px);
    }

    .prod-top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .prod-top-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(23,58,99,.12);
      background:rgba(255,255,255,.98);
      color:var(--prod-blue);
      font-weight:800;
      font-size:14px;
      text-decoration:none;
      transition:transform .14s ease,border-color .14s ease,color .14s ease,background .14s ease;
    }

    .prod-top-link:hover{
      transform:translateY(-1px);
      border-color:rgba(240,122,48,.28);
      color:var(--prod-orange);
      background:var(--prod-orange-soft);
    }

    body[data-page="seo-hub"] .hero{
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 18% 16%, rgba(240,122,48,.12), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(23,58,99,.08), transparent 30%),
        linear-gradient(180deg, var(--prod-soft) 0%, var(--prod-soft-2) 100%);
      border-bottom:1px solid rgba(23,58,99,.08);
    }

    body[data-page="seo-hub"] .hero-badge{
      background:rgba(255,255,255,.98);
      border:1px solid rgba(23,58,99,.10);
      box-shadow:var(--prod-shadow);
      color:var(--prod-blue);
    }

    body[data-page="seo-hub"] .section-tag{
      color:var(--prod-orange);
      font-family:"IBM Plex Sans", sans-serif;
      font-weight:900;
      letter-spacing:1.08px;
      text-transform:uppercase;
    }

    body[data-page="seo-hub"] .btn-primary{
      background:linear-gradient(180deg, #ffd9c3, #ffb780);
      color:var(--prod-blue);
      border:none;
      font-weight:900;
      text-decoration:none;
      box-shadow:0 16px 34px rgba(240,122,48,.18);
    }

    body[data-page="seo-hub"] .btn-primary:hover{
      color:var(--prod-blue);
      transform:translateY(-1px);
    }

    body[data-page="seo-hub"] .btn-secondary{
      background:rgba(255,255,255,.98);
      color:var(--prod-blue);
      border:1px solid rgba(23,58,99,.12);
      text-decoration:none;
    }

    body[data-page="seo-hub"] .btn-secondary:hover{
      color:var(--prod-orange);
      border-color:rgba(240,122,48,.26);
      background:var(--prod-orange-soft);
    }

    .prod-shell,
    .prod-main,
    .prod-side,
    .prod-focus,
    .prod-card,
    .prod-split,
    .prod-link-card,
    .prod-faq,
    .prod-cta-box{
      border-radius:24px;
      border:1px solid var(--prod-line);
      box-shadow:var(--prod-shadow);
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(246,250,255,.95));
    }

    .prod-shell{ margin-top:18px; padding:18px; }

    .prod-top-grid{
      display:grid;
      grid-template-columns:1.02fr .98fr;
      gap:18px;
      align-items:start;
    }

    .prod-main,
    .prod-side,
    .prod-focus,
    .prod-card,
    .prod-split,
    .prod-cta-box{
      padding:24px;
    }

    .prod-breadcrumb{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin:0 0 18px;
      color:var(--prod-blue-3);
      font-size:13px;
      font-family:"IBM Plex Sans", sans-serif;
    }

    .prod-breadcrumb a{
      color:var(--prod-blue);
      text-decoration:none;
      font-weight:700;
    }

    .prod-breadcrumb a:hover{ color:var(--prod-orange); }

    .prod-kicker{
      display:inline-block;
      margin-bottom:12px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(23,58,99,.07);
      color:var(--prod-blue);
      font-size:12px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
      font-family:"IBM Plex Sans", sans-serif;
    }

    .prod-main h1{
      margin:0 0 14px;
      color:var(--prod-blue);
      font-family:"Space Grotesk", Manrope, sans-serif;
      font-size:clamp(31px, 5vw, 48px);
      line-height:1.03;
      letter-spacing:-.03em;
    }

    .prod-main h1 em{
      color:var(--prod-blue-2);
      font-style:normal;
    }

    .prod-main p,
    .prod-side p,
    .prod-focus p,
    .prod-card p,
    .prod-split p,
    .prod-cta-box p,
    .prod-faq-body{
      margin:0;
      color:var(--prod-blue-3);
      line-height:1.72;
    }

    .prod-main p + p,
    .prod-side p + p,
    .prod-split p + p{ margin-top:12px; }

    .prod-pills{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:18px 0 20px;
    }

    .prod-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(23,58,99,.10);
      background:rgba(255,255,255,.96);
      color:var(--prod-blue);
      font-weight:800;
      font-size:13px;
      box-shadow:0 10px 24px rgba(16,40,68,.05);
    }

    .prod-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .prod-side h2,
    .prod-block h2,
    .prod-cta-box h2{
      margin:0 0 12px;
      color:var(--prod-blue);
      font-family:"Space Grotesk", Manrope, sans-serif;
      font-size:25px;
      line-height:1.1;
    }

    .prod-side-stack{
      display:grid;
      gap:12px;
      margin-top:16px;
    }

    .prod-side-box{
      padding:16px;
      border-radius:18px;
      border:1px solid rgba(23,58,99,.08);
      background:rgba(255,255,255,.88);
    }

    .prod-side-box strong{
      display:block;
      margin-bottom:6px;
      color:var(--prod-dark);
      font-size:15px;
      font-family:"Manrope", sans-serif;
    }

    .prod-side-box span{
      display:block;
      color:var(--prod-blue-3);
      font-size:14.5px;
      line-height:1.58;
    }

    .prod-block{ margin-top:22px; }

    .prod-focus-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:14px;
      margin-top:18px;
    }

    .prod-focus strong{
      display:block;
      margin-bottom:6px;
      color:var(--prod-blue);
      font-size:15px;
      font-family:"Manrope", sans-serif;
    }

    .prod-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:16px;
      margin-top:18px;
    }

    .prod-card h3,
    .prod-split h3,
    .prod-link-card h3{
      margin:0 0 10px;
      color:var(--prod-blue);
      font-size:22px;
      line-height:1.14;
      font-family:"Space Grotesk", Manrope, sans-serif;
    }

    .prod-tag{
      display:inline-block;
      margin-bottom:10px;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(23,58,99,.07);
      color:var(--prod-blue);
      font-size:12px;
      font-weight:900;
      letter-spacing:.8px;
      text-transform:uppercase;
      font-family:"IBM Plex Sans", sans-serif;
    }

    .prod-card ul{
      margin:14px 0 0;
      padding-left:18px;
      color:var(--prod-blue-3);
    }

    .prod-card li{
      margin-bottom:8px;
      line-height:1.54;
    }

    .prod-split-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .prod-checks{
      display:grid;
      gap:12px;
      margin-top:14px;
    }

    .prod-check{
      padding:14px;
      border-radius:18px;
      border:1px solid rgba(23,58,99,.08);
      background:rgba(255,255,255,.88);
    }

    .prod-check strong{
      display:block;
      margin-bottom:4px;
      color:var(--prod-blue);
      font-size:15px;
      font-family:"Manrope", sans-serif;
    }

    .prod-link-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:12px;
      margin-top:18px;
    }

    .prod-link-card{
      display:block;
      padding:18px;
      text-decoration:none;
      transition:transform .14s ease,border-color .14s ease,background .14s ease;
    }

    .prod-link-card:hover{
      transform:translateY(-2px);
      border-color:rgba(240,122,48,.28);
      background:var(--prod-orange-soft);
    }

    .prod-link-card strong{
      display:block;
      color:var(--prod-blue);
      margin-bottom:4px;
      font-size:15px;
    }

    .prod-link-card:hover strong{ color:var(--prod-orange); }

    .prod-link-card span{
      display:block;
      color:var(--prod-blue-3);
      font-size:14px;
      line-height:1.52;
    }

    .prod-link,
    .footer-seo-link,
    .prod-faq-body a{
      color:var(--prod-blue);
      text-decoration:none;
      font-weight:700;
    }

    .prod-link:hover,
    .footer-seo-link:hover,
    .prod-faq-body a:hover{ color:var(--prod-orange); }

    .prod-faqs{
      display:grid;
      gap:12px;
      margin-top:20px;
    }

    .prod-faq{
      overflow:hidden;
    }

    .prod-faq summary{
      list-style:none;
      cursor:pointer;
      padding:18px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      color:var(--prod-blue);
      font-family:"Space Grotesk", Manrope, sans-serif;
      font-weight:700;
      font-size:18px;
    }

    .prod-faq summary::-webkit-details-marker{ display:none; }

    .prod-faq summary::after{
      content:"+";
      font-size:26px;
      line-height:1;
      color:var(--prod-orange);
      flex-shrink:0;
    }

    .prod-faq[open] summary::after{ content:"−"; }

    .prod-faq-body{
      padding:0 20px 20px;
    }

    .prod-cta-box{
      text-align:center;
      margin-top:24px;
    }

    .prod-cta-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:18px;
    }

    body[data-page="seo-hub"] .cta-band{
      background:linear-gradient(180deg, var(--prod-cta) 0%, var(--prod-cta-2) 100%);
      border:1px solid rgba(23,58,99,.08);
      box-shadow:var(--prod-shadow);
    }

    body[data-page="seo-hub"] .cta-band h2,
    body[data-page="seo-hub"] .footer-logo,
    body[data-page="seo-hub"] .footer-seo-link,
    body[data-page="seo-hub"] .footer-copy{
      color:var(--prod-blue);
    }

    @media (max-width:1180px){
      .prod-top-grid,
      .prod-split-grid{
        grid-template-columns:1fr;
      }

      .prod-focus-grid,
      .prod-grid,
      .prod-link-grid{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width:760px){
      .prod-focus-grid,
      .prod-grid,
      .prod-link-grid{
        grid-template-columns:1fr;
      }

      .prod-top-actions{
        justify-content:flex-end;
      }
    }
  </style>
