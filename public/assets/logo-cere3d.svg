<svg xmlns="http://www.w3.org/2000/svg" width="420" height="80" viewBox="0 0 420 80" fill="none">
  <defs>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a2a"/>
      <stop offset="1" stop-color="#f26a1b"/>
    </linearGradient>
  </defs>

  <!-- Icon mic -->
  <g transform="translate(0,12)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#ffffff"/>
    <rect x="1" y="1" width="54" height="54" rx="13" fill="#284f8f" opacity="0.10"/>
    <path d="M28 12 16 17v17l12 6 12-6V17L28 12Z" fill="#284f8f"/>
    <path d="M28 16 20 19l8 3 8-3-8-3Z" fill="#ffffff" opacity="0.95"/>
    <circle cx="41.5" cy="15.5" r="4.2" fill="url(#orange)"/>
  </g>

  <!-- Text: CERE italic + 3D normal -->
  <text x="70" y="50"
        font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="38"
        font-weight="900"
        letter-spacing="0.6"
        fill="#0d2a57"
        font-style="italic">
    CERE
    <tspan dx="10" font-style="normal" fill="url(#orange)">3D</tspan>
  </text>

  <!-- Linie exact sub text (C → D) -->
  <!-- Start = 70 (text x), End ≈ 250 -->
  <rect x="70" y="60" width="180" height="5" rx="999"
        fill="url(#orange)" opacity="0.22"/>
</svg>
