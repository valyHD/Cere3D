1. Hub-uri pe intentie reala de om care are problema, nu doar pe categorie

Astea sunt foarte bune pentru trafic mai “cald”, adica om aproape de conversie.

Eu as crea acum aceste hub-uri mari:

a) piesa-rupta-printare-3d.html

Intentie: om care nu cauta neaparat “printare 3d”, ci are ceva rupt si cauta solutie.

Subpagini bune:

am-o-piesa-rupta-din-plastic.html

refacere-piesa-rupta-dupa-poza.html

refacere-piesa-rupta-dupa-model.html

copie-piesa-plastic-rupta.html

inlocuire-piesa-plastic-cu-printare-3d.html

Asta se leaga perfect de mesajul tau comercial real.

b) reparatie-prin-printare-3d.html

Intentie: om care vede printarea 3d ca reparatie, nu ca hobby.

Subpagini:

reparatie-obiect-plastic-printare-3d.html

reparatie-piese-casnice-printare-3d.html

reparatie-piese-auto-printare-3d.html

alternativa-la-piesa-originala.html
ai deja ceva asemanator, dar aici o bagi intr-un cluster clar

c) refacere-piesa-dupa-poza.html

Asta cred ca poate fi foarte puternic pentru Cere3D.

Subpagini:

printare-3d-dupa-poza.html

modelare-3d-dupa-poza.html

reconstituire-piesa-dupa-poza.html

refacere-obiect-dupa-poza.html

Foarte multi oameni cauta exact asta, chiar daca nu stiu termenii tehnici.

d) piesa-nu-se-mai-gaseste-solutii.html

Ai deja cateva pagini in directia asta, dar nu un hub mare dedicat.

Subpagini:

piesa-veche-inlocuire-printare-3d.html

piesa-scoasa-din-productie.html

piesa-rara-din-plastic.html

piesa-import-scump-alternativa.html

Aici intri pe intentie emotionala si practica: “nu mai gasesc piesa”.

2. Hub-uri pe servicii conexe printarii 3D

Aici poti prinde cautari care nu sunt doar “printare 3d”, ci servicii din jurul ei.

a) modelare-3d-la-comanda.html

Foarte important. Multi au nevoie de piesa, dar nu au fisier.

Subpagini:

model-3d-dupa-poza.html

model-3d-dupa-schita.html

desen-3d-pentru-printare.html

fisier-3d-pentru-printare.html

proiectare-piesa-3d-la-comanda.html

Asta e una dintre cele mai bune directii acum.

b) scanare-si-reproiectare-piesa.html

Chiar daca tu nu faci scanare clasica mereu, poti pozitiona pagina ca “scanare / masurare / reproiectare / refacere”.

Subpagini:

reproiectare-piesa-plastic.html

copiere-piesa-existenta-3d.html

refacere-piesa-dupa-masuratori.html

c) proiectare-si-printare-3d.html

Intentie comerciala foarte buna.
Omul vrea “tot pachetul”.

Subpagini:

de-la-idee-la-piesa-printata-3d.html

proiectare-prototip-si-printare-3d.html

servicii-complete-printare-3d.html

